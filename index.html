  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --muted: rgba(0,0,0,0.48);
      --chip: #f2f0eb;
      --chip-hover: #e7e2d8;
      --soft-chip: #f3f1ec;
      --soft-ink: rgba(0,0,0,0.62);
      --accent: #000;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      width: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      font-optical-sizing: auto;
      font-weight: 450;
      font-size: clamp(23px, 2.8vw, 32px);
      line-height: 1.58;
      padding: clamp(2.5rem, 7vw, 5rem) clamp(2rem, 8vw, 6rem);
      max-width: 1080px;
      min-height: 100vh;
      cursor: default;
      text-wrap: pretty;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }
    /* ── STATUS BAR ──────────────────────────── */

    /* ── MAIN PARAGRAPH ─────────────────────── */
    #para { display: inline; }
    #para, #para * { max-width: 100%; }

    /* ── TAP WORDS ──────────────────────────── */
    .tap {
      background: var(--chip);
      border-radius: 7px;
      padding: 0.02em 0.2em 0.05em;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.04em;
      display: inline;
      transition: background 0.18s, transform 0.18s;
      position: relative;
      white-space: nowrap;
      user-select: none;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      touch-action: manipulation;
    }
    .tap:hover { background: var(--chip-hover); transform: translateY(-1px); }
    .tap:active { transform: translateY(0); }
    .tap.used {
      background: transparent;
      cursor: default;
      pointer-events: none;
      transform: none;
    }
    /* ripple on tap */
    .tap::after {
      content:'';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tap:active::after { opacity: 1; }

    /* ── WORD-BY-WORD REVEAL ─────────────────── */
    .w {
      display: inline;
      opacity: 0;
      transform: translateY(4px);
      animation: wordIn 0.28s ease forwards;
      will-change: opacity, transform;
    }
    @keyframes wordIn {
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes wordInMobile {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── BADGES ─────────────────────────────── */
    .badge {
      display: inline-block;
      vertical-align: middle;
      position: relative;
      top: -0.04em;
      margin: 0 0.04em;
    }
    /* spinning gear */
    .gear-inner { transform-origin: 14px 14px; animation: spin 6s linear infinite; }
    .gear-inner:hover { animation-duration: 0.8s; }
    /* spiral pulse */
    .spiral-g { transform-origin: 13px 13px; animation: spinSlow 12s linear infinite; }
    /* sunburst rotate */
    .sun-g { transform-origin: 14px 14px; animation: spinSlow 20s linear infinite; }
    /* smiley wobble */
    .smiley-g { transform-origin: 14px 14px; animation: wobble 3s ease-in-out infinite; }
    /* server blink */
    .server-blink { animation: serverBlink 1.8s step-end infinite; }
    /* wave */
    .wave-g { animation: wave 2.5s ease-in-out infinite; transform-origin: 9px 16px; }
    .seal-g { transform-origin: 14px 14px; animation: spin 12s linear infinite; }
    .orbit-g { transform-origin: 14px 14px; animation: orbitSpin 12s linear infinite; }
    .cap-g { animation: capFloat 4.5s ease-in-out infinite; transform-origin: 14px 14px; }
    .pin-g { animation: pinBounce 3.8s ease-in-out infinite; transform-origin: 11px 14px; }

    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes spinSlow { to { transform: rotate(360deg); } }
    @keyframes wobble {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-6deg); }
      40%     { transform: rotate(6deg); }
      60%     { transform: rotate(-3deg); }
      80%     { transform: rotate(3deg); }
    }
    @keyframes serverBlink {
      0%,49% { opacity:1; }
      50%,100%{ opacity:0.2; }
    }
    @keyframes wave {
      0%,100% { transform: rotate(0deg); }
      25%     { transform: rotate(-20deg); }
      75%     { transform: rotate(20deg); }
    }
    @keyframes orbitSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes capFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes pinBounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    .soft-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      margin: 0 0.14em;
      padding: 0.06em 0.34em 0.1em;
      border-radius: 8px;
      background: var(--soft-chip);
      color: var(--soft-ink);
      line-height: 1;
      white-space: nowrap;
      vertical-align: 0.06em;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.76em;
      font-weight: 500;
      letter-spacing: -0.02em;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      max-width: 100%;
    }
    .soft-chip .badge {
      width: 0.95em;
      height: 0.95em;
      margin: 0;
      top: 0;
      flex: 0 0 auto;
    }
    .soft-chip--muted {
      color: var(--soft-ink);
    }
    .soft-chip--drift {
      animation: chipDrift 7s ease-in-out infinite;
    }
    .pill {
      display: inline;
      color: inherit;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1em;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    strong {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.045em;
    }
    .muted-meta {
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82em;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    @keyframes chipDrift {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }

    /* script font */
    .script {
      font-family: 'Caveat', cursive;
      font-size: 1em;
      font-weight: 700;
      color: rgba(0,0,0,0.78);
    }

    /* links */
    a { color: currentColor; font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .soft-chip a {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* ── BOTTOM BAR ──────────────────────────── */

    /* ── CURSOR ──────────────────────────────── */
    #cursor {
      display: inline-block;
      width: 2px;
      height: 0.9em;
      background: #000;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      position: relative;
      top: -1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── MOBILE ──────────────────────────────── */
    @media (hover:none) {
      .tap:hover {
        background: var(--chip);
        transform: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width:720px) {
      body {
        font-size: clamp(24px, 6.8vw, 30px);
        line-height: 1.54;
        padding: 1.6rem 1.15rem 2.5rem;
      }

      .w {
        transform: translateY(6px);
        animation-name: wordInMobile;
        animation-duration: 0.24s;
        animation-timing-function: cubic-bezier(.22,1,.36,1);
      }

      .soft-chip {
        gap: 0.24em;
        padding: 0.12em 0.36em 0.16em;
        vertical-align: baseline;
      }
    }

    @media (max-width:520px) {
      body {
        font-size: clamp(21px, 7.4vw, 25px);
        line-height: 1.56;
        padding: 1.3rem 1rem 2.2rem;
      }

      .tap {
        white-space: normal;
        line-height: 1.1;
      }

      .soft-chip {
        gap: 0.22em;
        font-size: 0.72em;
        white-space: normal;
        flex-wrap: wrap;
      }

      #cursor { display: none; }
    }
  </style>
</head>

function getWordStep(tokenValue) {
  const len = tokenValue.trim().length;
  const base = mobileLite ? 42 : 30;
  const scale = mobileLite ? 7 : 6;
  return base + Math.min(len, 12) * scale;
}

/* ════════════════════════════════════════════
   WORD-BY-WORD REVEAL
═══════════════════════════════════════════ */
function tokenise(html) {
  // Split on spaces but keep tags intact
  const div = document.createElement('div');
  div.innerHTML = html;
  const tokens = [];
  div.childNodes.forEach(n => {
    if (n.nodeType === Node.TEXT_NODE) {
      n.textContent.split(/(\s+)/).filter(Boolean).forEach(w => tokens.push({type:'text',v:w}));
    } else {
      tokens.push({type:'node', v:n.cloneNode(true)});
    }
  });
  return tokens;
}

function queueInsert(parent, node, delay=0) {
  window.setTimeout(() => {
    parent.appendChild(node);
  }, delay);
}

function revealWords(html, container, baseDelay=0) {
  const tokens = tokenise(html);
  let d = baseDelay;
  tokens.forEach(tok => {
    const wrap = document.createElement('span');
    wrap.className = 'w';
    wrap.style.animationDelay = '0ms';
    if (tok.type === 'text') {
      wrap.textContent = tok.v;
    } else {
      wrap.appendChild(tok.v);
    }
    queueInsert(container, wrap, d);
    // only delay non-whitespace
    if (tok.type === 'text' && tok.v.trim()) d += getWordStep(tok.v);
  });
  return d;
}

/* ════════════════════════════════════════════
   RENDERER
═══════════════════════════════════════════ */
function render(items, container, delay=0) {
  items.forEach(item => {
    if (typeof item === 'string') {
      delay = revealWords(item, container, delay);
    } else {
      // Tap button — no word-by-word, just appear with main delay
      const btn = document.createElement('span');
      btn.className = 'tap w';
      btn.style.animationDelay = '0ms';
      btn.textContent = item.tap;

      btn.addEventListener('click', function() {
        if (btn.classList.contains('used')) return;
        btn.classList.add('used');

        // Insert expansion after btn, word by word
        const frag = document.createElement('span');
        let d = 0;
        item.expand.forEach(child => {
          if (typeof child === 'string') {
            d = revealWords(child, frag, d) + expandGap;
          } else {
            // nested tap — also word-by-word but rendered as tap
            const innerWrap = document.createElement('span');
            innerWrap.className = 'w';
            innerWrap.style.animationDelay = '0ms';
            d += tapStep;
            const innerBtn = document.createElement('span');
            innerBtn.className = 'tap';
            innerBtn.textContent = child.tap;
            innerBtn.addEventListener('click', function() {
              if (innerBtn.classList.contains('used')) return;
              innerBtn.classList.add('used');
              const f2 = document.createElement('span');
              let d2 = 0;
              child.expand.forEach(c2 => {
                if (typeof c2 === 'string') d2 = revealWords(c2, f2, d2) + expandGap;
              });
              innerBtn.insertAdjacentElement('afterend', f2);
            }, {once:true});
            innerWrap.appendChild(innerBtn);
            queueInsert(frag, innerWrap, d);
          }
        });
        btn.insertAdjacentElement('afterend', frag);
      }, {once:true});

      queueInsert(container, btn, delay);
      delay += tapStep;
    }
  });
}

/* secret: konami code easter egg */
const konami = [38,38,40,40,37,39,37,39,66,65];
let ki = 0;
document.addEventListener('keydown', e => {
  if (e.keyCode === konami[ki]) { ki++; } else { ki = 0; }
  if (ki === konami.length) {
    ki = 0;
    document.body.style.fontFamily = "'Space Grotesk', sans-serif";
    document.body.style.fontSize = "14px";
    setTimeout(()=>{
      document.body.style.fontFamily = '';
      document.body.style.fontSize = '';
    }, 3000);
  }
});
